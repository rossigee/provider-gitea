# A tiny stateful mock of the Gitea REST API (the subset the provider's client
# speaks, under /api/v1). It replaces a real Gitea so `make e2e` runs the full
# create -> Ready -> delete loop on a throwaway kind cluster with no external
# dependency. ~stdlib Python, served from a ConfigMap by the upstream python
# image — no custom image to build/push.
#
# It is deliberately FAITHFUL where faithfulness bites (lesson #12): it issues
# real numeric ids, returns a populated owner on repo create (so the controller
# can pin owner/name as the external-name), and returns a real 404 for absent
# objects (so Observe's not-found classification and idempotent delete are
# actually exercised). Add new routes here as controllers are fanned out.
apiVersion: v1
kind: Namespace
metadata:
  name: provider-gitea-e2e
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-mock-src
  namespace: provider-gitea-e2e
data:
  server.py: |
    #!/usr/bin/env python3
    """In-memory Gitea REST API mock for e2e. NOT for production."""
    import json, re
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    # The user the token authenticates as (for POST /user/repos etc.).
    AUTH_USER = "e2e-user"

    # repos keyed by "owner/name".
    REPOS = {}
    NEXT_ID = [1000]

    def next_id():
        NEXT_ID[0] += 1
        return NEXT_ID[0]

    def repo_obj(owner, name, body):
        return {
            "id": next_id(),
            "name": name,
            "full_name": "%s/%s" % (owner, name),
            "description": body.get("description", ""),
            "private": body.get("private", False),
            "template": body.get("template", False),
            "archived": body.get("archived", False),
            "empty": not body.get("auto_init", False),
            "size": 0,
            "html_url": "http://gitea.local/%s/%s" % (owner, name),
            "ssh_url": "git@gitea.local:%s/%s.git" % (owner, name),
            "clone_url": "http://gitea.local/%s/%s.git" % (owner, name),
            "language": "",
            "default_branch": body.get("default_branch", "main"),
            "owner": {"id": 1, "username": owner, "login": owner},
        }

    # (method, compiled-regex) -> handler(self, match, body)
    ROUTES = []
    def route(method, pattern):
        rx = re.compile("^/api/v1" + pattern + "$")
        def deco(fn):
            ROUTES.append((method, rx, fn))
            return fn
        return deco

    @route("POST", r"/user/repos")
    def create_user_repo(self, m, body):
        owner = AUTH_USER
        key = "%s/%s" % (owner, body["name"])
        REPOS[key] = repo_obj(owner, body["name"], body)
        return 201, REPOS[key]

    @route("POST", r"/orgs/([^/]+)/repos")
    def create_org_repo(self, m, body):
        owner = m.group(1)
        key = "%s/%s" % (owner, body["name"])
        REPOS[key] = repo_obj(owner, body["name"], body)
        return 201, REPOS[key]

    @route("GET", r"/repos/([^/]+)/([^/]+)")
    def get_repo(self, m, body):
        key = "%s/%s" % (m.group(1), m.group(2))
        r = REPOS.get(key)
        return (200, r) if r else (404, {"message": "repo not found"})

    @route("PATCH", r"/repos/([^/]+)/([^/]+)")
    def update_repo(self, m, body):
        key = "%s/%s" % (m.group(1), m.group(2))
        r = REPOS.get(key)
        if not r:
            return 404, {"message": "repo not found"}
        for f in ("description", "private", "template", "archived", "default_branch"):
            if f in body and body[f] is not None:
                r[f] = body[f]
        return 200, r

    @route("DELETE", r"/repos/([^/]+)/([^/]+)")
    def delete_repo(self, m, body):
        key = "%s/%s" % (m.group(1), m.group(2))
        if key not in REPOS:
            return 404, {"message": "repo not found"}
        del REPOS[key]
        return 204, None

    # --- Organization (name-keyed) -----------------------------------------
    ORGS = {}
    @route("POST", r"/orgs")
    def create_org(self, m, body):
        u = body["username"]
        ORGS[u] = {"id": next_id(), "username": u, "name": body.get("name", u),
                   "description": body.get("description", ""),
                   "website": body.get("website", ""),
                   "location": body.get("location", ""),
                   "visibility": body.get("visibility", "public")}
        return 201, ORGS[u]

    @route("GET", r"/orgs/([^/]+)")
    def get_org(self, m, body):
        o = ORGS.get(m.group(1))
        return (200, o) if o else (404, {"message": "org not found"})

    @route("PATCH", r"/orgs/([^/]+)")
    def patch_org(self, m, body):
        # Upsert: OrganizationSettings has no create endpoint — its controller
        # applies settings via PATCH /orgs/{org}, so PATCH must create-if-missing.
        o = ORGS.get(m.group(1))
        if not o:
            o = ORGS[m.group(1)] = {"id": next_id(), "username": m.group(1), "name": m.group(1)}
        o.update({k: v for k, v in body.items() if v is not None})
        return 200, o

    @route("DELETE", r"/orgs/([^/]+)")
    def delete_org(self, m, body):
        return (204, None) if ORGS.pop(m.group(1), None) else (404, {"message": "org not found"})

