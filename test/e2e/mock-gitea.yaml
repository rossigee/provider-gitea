    # --- Action workflows (repo + workflow name) ---------------------------
    ACTIONS = {}
    def _action_obj(name, content):
        # workflow_file is a STRUCT in the client (clients.ActionWorkflowFile),
        # not a string — returning a bare string here is exactly the faithfulness
        # gap lesson #12 warns about (it unmarshal-fails only against a backend).
        return {"workflow_name": name, "state": "active",
                "workflow_file": {"path": ".gitea/workflows/%s" % name, "content": content, "size": len(content)}}

    @route("POST", r"/repos/([^/]+)/([^/]+)/actions/workflows")
    def create_action(self, m, body):
        name = body.get("workflow_name") or body.get("name") or body.get("path", "").split("/")[-1]
        content = body.get("content", body.get("workflow_file", "")) or ""
        k = "%s/%s/%s" % (m.group(1), m.group(2), name)
        ACTIONS[k] = _action_obj(name, content if isinstance(content, str) else "")
        # Record the repo so a GET for the spec's workflow name resolves even if
        # the create body named the workflow differently.
        ACTIONS.setdefault("_repos", set()).add("%s/%s" % (m.group(1), m.group(2)))
        return 201, ACTIONS[k]

    @route("GET", r"/repos/([^/]+)/([^/]+)/actions/workflows/([^/]+)")
    def get_action(self, m, body):
        k = "%s/%s/%s" % (m.group(1), m.group(2), m.group(3))
        if k in ACTIONS:
            return 200, ACTIONS[k]
        if "%s/%s" % (m.group(1), m.group(2)) in ACTIONS.get("_repos", set()):
            return 200, _action_obj(m.group(3), "")
        return 404, {"message": "workflow not found"}

    @route("PATCH", r"/repos/([^/]+)/([^/]+)/actions/workflows/([^/]+)")
    def patch_action(self, m, body):
        k = "%s/%s/%s" % (m.group(1), m.group(2), m.group(3))
        ACTIONS[k] = dict(ACTIONS.get(k, {"workflow_name": m.group(3)}),
                          **{kk: v for kk, v in body.items() if v is not None})
        return 200, ACTIONS[k]

    @route("DELETE", r"/repos/([^/]+)/([^/]+)/actions/workflows/([^/]+)")
    def delete_action(self, m, body):
        k = "%s/%s/%s" % (m.group(1), m.group(2), m.group(3))
        ACTIONS.pop(k, None)
        ACTIONS.get("_repos", set()).discard("%s/%s" % (m.group(1), m.group(2)))
        return 204, None

    # --- Git hooks (repo + hook type) --------------------------------------
    GITHOOKS = {}
    @route("POST", r"/repos/([^/]+)/([^/]+)/hooks/git/([^/]+)")
    def create_githook(self, m, body):
        k = "%s/%s/%s" % (m.group(1), m.group(2), m.group(3))
        GITHOOKS[k] = {"type": m.group(3), "content": body.get("content", ""),
                       "is_active": body.get("is_active", True)}
        return 201, GITHOOKS[k]

    @route("GET", r"/repos/([^/]+)/([^/]+)/hooks/git/([^/]+)")
    def get_githook(self, m, body):
        k = "%s/%s/%s" % (m.group(1), m.group(2), m.group(3))
        return (200, GITHOOKS[k]) if k in GITHOOKS else (404, {"message": "git hook not found"})

    @route("PATCH", r"/repos/([^/]+)/([^/]+)/hooks/git/([^/]+)")
    def patch_githook(self, m, body):
        k = "%s/%s/%s" % (m.group(1), m.group(2), m.group(3))
        GITHOOKS[k] = dict(GITHOOKS.get(k, {"type": m.group(3)}),
                           **{kk: v for kk, v in body.items() if v is not None})
        return 200, GITHOOKS[k]

    @route("DELETE", r"/repos/([^/]+)/([^/]+)/hooks/git/([^/]+)")
    def delete_githook(self, m, body):
        k = "%s/%s/%s" % (m.group(1), m.group(2), m.group(3))
        return (204, None) if GITHOOKS.pop(k, None) is not None else (404, {"message": "git hook not found"})

    # --- Org members (org + username) --------------------------------------
    ORGMEMBERS = {}
    @route("PUT", r"/orgs/([^/]+)/members/([^/]+)")
    def add_orgmember(self, m, body):
        ORGMEMBERS["%s/%s" % (m.group(1), m.group(2))] = {"username": m.group(2), "login": m.group(2)}
        return 204, None

    @route("GET", r"/orgs/([^/]+)/members/([^/]+)")
    def get_orgmember(self, m, body):
        k = "%s/%s" % (m.group(1), m.group(2))
        return (200, ORGMEMBERS[k]) if k in ORGMEMBERS else (404, {"message": "member not found"})

    @route("DELETE", r"/orgs/([^/]+)/members/([^/]+)")
    def del_orgmember(self, m, body):
        k = "%s/%s" % (m.group(1), m.group(2))
        return (204, None) if ORGMEMBERS.pop(k, None) is not None else (404, {"message": "member not found"})

    # --- Repo collaborators (owner/repo + username) ------------------------
    COLLABS = {}
    @route("PUT", r"/repos/([^/]+)/([^/]+)/collaborators/([^/]+)")
    def add_collab(self, m, body):
        COLLABS["%s/%s/%s" % (m.group(1), m.group(2), m.group(3))] = {
            "username": m.group(3), "permissions": {"admin": False, "push": True, "pull": True}}
        return 204, None

    @route("GET", r"/repos/([^/]+)/([^/]+)/collaborators/([^/]+)")
    def get_collab(self, m, body):
        k = "%s/%s/%s" % (m.group(1), m.group(2), m.group(3))
        return (200, COLLABS[k]) if k in COLLABS else (404, {"message": "collaborator not found"})

    @route("DELETE", r"/repos/([^/]+)/([^/]+)/collaborators/([^/]+)")
    def del_collab(self, m, body):
        k = "%s/%s/%s" % (m.group(1), m.group(2), m.group(3))
        return (204, None) if COLLABS.pop(k, None) is not None else (404, {"message": "collaborator not found"})

    # --- Org secrets (org + name; PUT create/update) -----------------------
    ORGSECRETS = {}
    @route("PUT", r"/orgs/([^/]+)/actions/secrets/([^/]+)")
    def put_orgsecret(self, m, body):
        ORGSECRETS["%s/%s" % (m.group(1), m.group(2))] = {"name": m.group(2)}
        return 201, None

    @route("GET", r"/orgs/([^/]+)/actions/secrets/([^/]+)")
    def get_orgsecret(self, m, body):
        k = "%s/%s" % (m.group(1), m.group(2))
        return (200, {"name": m.group(2)}) if k in ORGSECRETS else (404, {"message": "secret not found"})

    @route("DELETE", r"/orgs/([^/]+)/actions/secrets/([^/]+)")
    def del_orgsecret(self, m, body):
        k = "%s/%s" % (m.group(1), m.group(2))
        return (204, None) if ORGSECRETS.pop(k, None) is not None else (404, {"message": "secret not found"})

    class H(BaseHTTPRequestHandler):
        def _send(self, code, body=None):
            self.send_response(code)
            if body is not None:
                self.send_header("Content-Type", "application/json")
            self.end_headers()
            if body is not None:
                self.wfile.write(json.dumps(body).encode())

        def _read(self):
            n = int(self.headers.get("Content-Length", 0) or 0)
            return json.loads(self.rfile.read(n) or b"{}")

        def _dispatch(self, method):
            body = self._read() if method in ("POST", "PUT", "PATCH") else {}
            for mth, rx, fn in ROUTES:
                if mth != method:
                    continue
                m = rx.match(self.path)
                if m:
                    code, resp = fn(self, m, body)
                    return self._send(code, resp)
            self._send(404, {"message": "no route: %s %s" % (method, self.path)})

        def do_GET(self):    self._dispatch("GET")
        def do_POST(self):   self._dispatch("POST")
        def do_PUT(self):    self._dispatch("PUT")
        def do_PATCH(self):  self._dispatch("PATCH")
        def do_DELETE(self): self._dispatch("DELETE")
        def log_message(self, *a): pass

    if __name__ == "__main__":
        print("gitea-mock listening on :8080", flush=True)
        ThreadingHTTPServer(("0.0.0.0", 8080), H).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-mock
  namespace: provider-gitea-e2e
  labels: {app: gitea-mock}
spec:
  replicas: 1
  selector:
    matchLabels: {app: gitea-mock}
  template:
    metadata:
      labels: {app: gitea-mock}
    spec:
      containers:
        - name: mock
          # gcr.io's Docker Hub mirror — avoids Docker Hub's unauthenticated
          # pull rate limit (429) that otherwise flakes e2e on shared CI IPs
          # (lesson #19).
          image: mirror.gcr.io/library/python:3.12-alpine
          command: ["python3", "/app/server.py"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - {name: src, mountPath: /app}
          readinessProbe:
            tcpSocket: {port: 8080}
            initialDelaySeconds: 2
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
            seccompProfile: {type: RuntimeDefault}
      volumes:
        - name: src
          configMap: {name: gitea-mock-src}
---
apiVersion: v1
kind: Service
metadata:
  name: gitea-mock
  namespace: provider-gitea-e2e
spec:
  selector: {app: gitea-mock}
  ports:
    - {port: 8080, targetPort: 8080}
