name: E2E (kind + mock Gitea)

# The "works by design" gate. On every PR and merge to the default branch, this
# stands up a throwaway kind cluster, builds + installs the provider PACKAGE (the
# real xpkg, not just `go test`), and drives apply -> Ready -> delete over
# examples/e2e/* against an in-cluster mock Gitea. A green run proves the CRs
# actually reconcile end to end — the thing unit tests and `helm template` can't.
# See crossplane-provider-template dev/docs/08-cluster-validation.md.

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26.4'
  CROSSPLANE_CLI_VERSION: 'v2.3.2'
  CHAINSAW_VERSION: 'v0.2.15'
  KIND_VERSION: 'v0.31.0'

jobs:
  e2e:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install tooling (crossplane CLI, kind, helm, chainsaw)
        run: |
          set -euo pipefail
          # Install into a writable dir on PATH — /usr/local/bin needs sudo on
          # GitHub runners (curl -o / chmod there fail with "Operation not
          # permitted"). Lesson #13.
          BIN="$HOME/.local/bin"; mkdir -p "$BIN"
          curl -fsSL "https://releases.crossplane.io/stable/${CROSSPLANE_CLI_VERSION}/bin/linux_amd64/crank" -o "$BIN/crossplane"
          curl -fsSL "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64" -o "$BIN/kind"
          curl -fsSL "https://github.com/kyverno/chainsaw/releases/download/${CHAINSAW_VERSION}/chainsaw_linux_amd64.tar.gz" | tar -xz -C "$BIN" chainsaw
          chmod +x "$BIN/crossplane" "$BIN/kind" "$BIN/chainsaw"
          HELM_INSTALL_DIR="$BIN" USE_SUDO=false bash <(curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3)
          echo "$BIN" >> "$GITHUB_PATH"
          # NB: it's `crossplane version --client`, not `crossplane --version`.
          "$BIN/crossplane" version --client; "$BIN/kind" --version; "$BIN/helm" version --short; "$BIN/chainsaw" version

      - name: Run e2e on kind (self-contained: local xpkg + local registry + mock backend)
        run: bash scripts/e2e.sh
