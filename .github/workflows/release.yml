name: Release

# Canonical release path. Builds a multi-arch Crossplane package and pushes it
# as a SINGLE OCI index, with a hard gate that package.yaml carries the Provider
# meta + every CRD (scripts/verify-xpkg.sh). This deliberately REPLACES the old
# release.yml that pushed a plain runtime Docker image to the provider tag — that
# shipped a package with zero CRDs, so the provider installed Healthy yet every
# MR failed with "no matches for kind" (crossplane-provider-template lesson #5).
#
# It runs scripts/publish.sh so a local `make publish` and a tagged release
# produce identical artifacts.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "OCI tag to publish (semver, e.g. v0.9.0)"
        required: true
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.26.4'
  CROSSPLANE_CLI_VERSION: 'v2.3.2'

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Resolve version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Regenerate CRDs (the package must carry them)
        run: bash scripts/generate.sh

      - name: Set up QEMU (cross-arch runtime images)
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + verify + push multi-arch package
        run: bash scripts/publish.sh
        env:
          VERSION: ${{ steps.v.outputs.version }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}
