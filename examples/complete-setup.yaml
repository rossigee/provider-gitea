# Complete Gitea Infrastructure Setup Example
# This demonstrates all managed resources working together for a complete CI/CD workflow

# 1. Create Organization
apiVersion: organization.gitea.m.crossplane.io/v2
kind: Organization
metadata:
  name: infrastructure-org
  namespace: default
  annotations:
    crossplane.io/external-name: infrastructure
spec:
  forProvider:
    username: infrastructure
    name: "Infrastructure Team"
    fullName: "Infrastructure and DevOps Team"
    description: "Organization for infrastructure and DevOps repositories"
    website: "https://infra.golder.lan"
    location: "Global"
    visibility: public
    repoAdminChangeTeamAccess: false
  providerConfigRef:
    name: default

---
# 2. Create Repository for provider-gitea
apiVersion: repository.gitea.m.crossplane.io/v2
kind: Repository
metadata:
  name: provider-gitea-repo
  namespace: default
  annotations:
    crossplane.io/external-name: provider-gitea
spec:
  forProvider:
    name: provider-gitea
    owner: infrastructure
    description: "Crossplane provider for Gitea API management"
    private: false
    autoInit: true
    defaultBranch: master
    hasIssues: true
    hasWiki: true
    hasPullRequests: true
    hasActions: true
    allowMergeCommits: true
    allowRebase: true
    allowSquashMerge: true
    license: Apache-2.0
    gitignores: Go
  providerConfigRef:
    name: default

---
# 3. Create CI/CD User for automated operations
apiVersion: user.gitea.m.crossplane.io/v2
kind: User
metadata:
  name: ci-user
  namespace: default
  annotations:
    crossplane.io/external-name: gitea-ci
spec:
  forProvider:
    username: gitea-ci
    email: ci@infra.golder.lan
    passwordSecretRef:
      namespace: default
      name: ci-user-password
      key: password
    fullName: "Gitea CI/CD Bot"
    sendNotify: false
    mustChangePassword: false
    restricted: false
    visibility: private
  providerConfigRef:
    name: default

---
# 4. Create Organization Secrets for Harbor integration
apiVersion: organizationsecret.gitea.m.crossplane.io/v2
kind: OrganizationSecret
metadata:
  name: harbor-registry
  namespace: default
  annotations:
    crossplane.io/external-name: HARBOR_REGISTRY
spec:
  forProvider:
    organization: infrastructure
    secretName: HARBOR_REGISTRY
    valueSecretRef:
      namespace: default
      name: harbor-registry-value
      key: value
  providerConfigRef:
    name: default

---
apiVersion: organizationsecret.gitea.m.crossplane.io/v2
kind: OrganizationSecret
metadata:
  name: harbor-credentials
  namespace: default
  annotations:
    crossplane.io/external-name: HARBOR_ROBOT_TOKEN
spec:
  forProvider:
    organization: infrastructure
    secretName: HARBOR_ROBOT_TOKEN
    valueSecretRef:
      namespace: gitea-secrets
      name: harbor-robot-credentials
      key: robot-token
  providerConfigRef:
    name: default

---
apiVersion: organizationsecret.gitea.m.crossplane.io/v2
kind: OrganizationSecret
metadata:
  name: docker-project
  namespace: default
  annotations:
    crossplane.io/external-name: DOCKER_PROJECT
spec:
  forProvider:
    organization: infrastructure
    secretName: DOCKER_PROJECT
    valueSecretRef:
      namespace: default
      name: docker-project-value
      key: value
  providerConfigRef:
    name: default

---
# 5. Create Webhook for automated builds
apiVersion: webhook.gitea.m.crossplane.io/v2
kind: Webhook
metadata:
  name: harbor-build-webhook
  namespace: default
spec:
  forProvider:
    repository: provider-gitea
    owner: infrastructure
    url: "https://ci.infra.golder.lan/webhook/gitea/build"
    type: gitea
    contentType: json
    active: true
    events:
      - push
      - pull_request
      - tag
    secret: "webhook-secret-for-ci-validation"
    sslVerification: true
  providerConfigRef:
    name: default

---
# Supporting Kubernetes secrets
apiVersion: v1
kind: Secret
metadata:
  name: ci-user-password
  namespace: default
type: Opaque
data:
  # base64-encoded "AutoGeneratedSecurePassword123!"
  password: "QXV0b0dlbmVyYXRlZFNlY3VyZVBhc3N3b3JkMTIzIQ=="

---
apiVersion: v1
kind: Secret
metadata:
  name: harbor-registry-value
  namespace: default
type: Opaque
data:
  # base64-encoded "harbor.infra.golder.lan"
  value: "aGFyYm9yLmluZnJhLmdvbGRlci5sYW4="

---
apiVersion: v1
kind: Secret
metadata:
  name: docker-project-value
  namespace: default
type: Opaque
data:
  # base64-encoded "crossplane-providers"
  value: "Y3Jvc3NwbGFuZS1wcm92aWRlcnM="
