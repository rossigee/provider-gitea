apiVersion: gitea.m.crossplane.io/v1beta1
kind: User
metadata: {name: uptest-user, namespace: provider-gitea-e2e, annotations: {meta.upbound.io/example-id: user/v2/user, uptest.upbound.io/update-parameter: '{"fullName":"Uptest User Updated"}'}}
spec:
  forProvider:
    username: uptest-user
    email: uptest-user@example.com
    # Password is read from a Secret, never set inline (secret-ref convention).
    passwordSecretRef: {namespace: provider-gitea-e2e, name: uptest-user-password, key: password}
    # Mutable field exercised by the uptest update step.
    fullName: Uptest User
  providerConfigRef: {name: e2e, kind: ProviderConfig}
