apiVersion: label.gitea.m.crossplane.io/v2
kind: Label
metadata: {name: uptest-label-org, namespace: provider-gitea-e2e, annotations: {meta.upbound.io/example-id: label/v2/label-org, uptest.upbound.io/update-parameter: '{"color":"0000ff"}'}}
spec:
