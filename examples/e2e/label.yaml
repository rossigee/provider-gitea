# Label: repo-scoped, backend-assigned numeric id (external-name = id).
apiVersion: label.gitea.m.crossplane.io/v2
kind: Label
metadata:
  name: uptest-label
  namespace: provider-gitea-e2e
  annotations:
    meta.upbound.io/example-id: label/v2/label
spec:
  forProvider:
    name: uptest-label
    repository: e2e-user/uptest-repo
    color: "00ff00"
    description: created by provider-gitea e2e
  providerConfigRef:
    name: e2e
    kind: ProviderConfig
