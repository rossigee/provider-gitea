# Organization: name-keyed identity (external-name = username).
apiVersion: organization.gitea.m.crossplane.io/v2
kind: Organization
metadata:
  name: uptest-org
  namespace: provider-gitea-e2e
  annotations:
    meta.upbound.io/example-id: organization/v2/organization
spec:
  forProvider:
    username: uptest-org
    description: created by provider-gitea e2e
    visibility: public
  providerConfigRef:
    name: e2e
    kind: ProviderConfig
