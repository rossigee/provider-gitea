apiVersion: gitea.m.crossplane.io/v1beta1
kind: Webhook
metadata: {name: uptest-webhook, namespace: provider-gitea-e2e, annotations: {meta.upbound.io/example-id: webhook/v2/webhook}}
spec:
  forProvider:
    owner: gitea_admin
    repository: uptest-repo
    url: http://example.com/hook
    type: gitea
    events: [push]
  providerConfigRef: {name: e2e, kind: ProviderConfig}
