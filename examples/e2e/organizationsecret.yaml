apiVersion: gitea.m.crossplane.io/v1beta1
kind: OrganizationSecret
metadata: {name: uptest-orgsecret, namespace: provider-gitea-e2e, annotations: {meta.upbound.io/example-id: organizationsecret/v2/organizationsecret}}
spec:
  forProvider:
    organization: uptest-org
    secretName: UPTEST_ORG_SECRET
    # Value is read from a Secret, never set inline (secret-ref convention).
    valueSecretRef: {namespace: provider-gitea-e2e, name: uptest-secret-value, key: value}
  providerConfigRef: {name: e2e, kind: ProviderConfig}
