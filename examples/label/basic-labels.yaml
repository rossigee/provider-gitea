---
# Bug label with red color
apiVersion: label.gitea.m.crossplane.io/v2
kind: Label
metadata:
  name: bug-label
  namespace: default
spec:
  forProvider:
    name: bug
    repository: my-example-org/my-repo
    color: "ff0000"
    description: "Something isn't working"
    exclusive: false
  providerConfigRef:
    name: default
---
# Enhancement label with green color
apiVersion: label.gitea.m.crossplane.io/v2
kind: Label
metadata:
  name: enhancement-label
  namespace: default
spec:
  forProvider:
    name: enhancement
    repository: my-example-org/my-repo
    color: "00ff00"
    description: "New feature or request"
    exclusive: false
  providerConfigRef:
    name: default
---
# Priority scoped labels (exclusive)
apiVersion: label.gitea.m.crossplane.io/v2
kind: Label
metadata:
  name: priority-high-label
  namespace: default
spec:
  forProvider:
    name: "priority/high"
    repository: my-example-org/my-repo
    color: "ff6b6b"
    description: "High priority issue"
    exclusive: true
  providerConfigRef:
    name: default
---
apiVersion: label.gitea.m.crossplane.io/v2
kind: Label
metadata:
  name: priority-medium-label
  namespace: default
spec:
  forProvider:
    name: "priority/medium"
    repository: my-example-org/my-repo
    color: "ffa726"
    description: "Medium priority issue"
    exclusive: true
  providerConfigRef:
    name: default
---
apiVersion: label.gitea.m.crossplane.io/v2
kind: Label
metadata:
  name: priority-low-label
  namespace: default
spec:
  forProvider:
    name: "priority/low"
    repository: my-example-org/my-repo
    color: "66bb6a"
    description: "Low priority issue"
    exclusive: true
  providerConfigRef:
    name: default
---
# Organization-scoped label (scope: org). Targets /orgs/{org}/labels; repository
# must be omitted. Without scope, labels default to repo scope (backward compat).
apiVersion: label.gitea.m.crossplane.io/v2
kind: Label
metadata:
  name: org-security-label
  namespace: default
spec:
  forProvider:
    name: security
    scope: org
    organization: my-example-org
    color: "d73a4a"
    description: "Security-related, applies org-wide"
  providerConfigRef:
    name: default
