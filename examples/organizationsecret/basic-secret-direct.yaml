apiVersion: organizationsecret.gitea.m.crossplane.io/v2
kind: OrganizationSecret
metadata:
  name: example-direct-secret
  namespace: default
  annotations:
    crossplane.io/external-name: DEPLOY_TOKEN
spec:
  forProvider:
    organization: my-example-org
    secretName: DEPLOY_TOKEN
    valueSecretRef:
      namespace: default
      name: example-direct-secret-value
      key: value
  providerConfigRef:
    name: default

---
# Supporting Kubernetes secret holding the value
apiVersion: v1
kind: Secret
metadata:
  name: example-direct-secret-value
  namespace: default
type: Opaque
data:
  # base64-encoded "github_pat_11ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890"
  value: "Z2l0aHViX3BhdF8xMUFCQ0RFRkdISUpLTE1OT1BRUlNUVVZXWFlaMTIzNDU2Nzg5MA=="
