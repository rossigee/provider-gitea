apiVersion: gitea.m.crossplane.io/v1beta1
kind: OrganizationSecret
metadata:
  name: harbor-registry-secret
  namespace: default
  annotations:
    crossplane.io/external-name: HARBOR_REGISTRY_URL
    description: "Harbor container registry URL for CI/CD pipelines"
spec:
  forProvider:
    organization: infrastructure
    secretName: HARBOR_REGISTRY_URL
    valueSecretRef:
      namespace: default
      name: harbor-registry-url-value
      key: value
  providerConfigRef:
    name: default
---
apiVersion: gitea.m.crossplane.io/v1beta1
kind: OrganizationSecret
metadata:
  name: harbor-robot-credentials
  namespace: default
  annotations:
    crossplane.io/external-name: HARBOR_ROBOT_TOKEN
    description: "Harbor robot account credentials for automated pushes"
spec:
  forProvider:
    organization: infrastructure
    secretName: HARBOR_ROBOT_TOKEN
    valueSecretRef:
      namespace: gitea-secrets
      name: harbor-robot-credentials
      key: robot-token
  providerConfigRef:
    name: default
---
apiVersion: gitea.m.crossplane.io/v1beta1
kind: OrganizationSecret
metadata:
  name: harbor-project-name
  namespace: default
  annotations:
    crossplane.io/external-name: HARBOR_PROJECT
    description: "Harbor project name for container images"
spec:
  forProvider:
    organization: infrastructure
    secretName: HARBOR_PROJECT
    valueSecretRef:
      namespace: default
      name: harbor-project-value
      key: value
  providerConfigRef:
    name: default
---
# Supporting Kubernetes secret holding the registry URL value
apiVersion: v1
kind: Secret
metadata:
  name: harbor-registry-url-value
  namespace: default
type: Opaque
data:
  # base64-encoded "harbor.infra.golder.lan"
  value: "aGFyYm9yLmluZnJhLmdvbGRlci5sYW4="
---
# Supporting Kubernetes secret holding the project name value
apiVersion: v1
kind: Secret
metadata:
  name: harbor-project-value
  namespace: default
type: Opaque
data:
  # base64-encoded "crossplane-providers"
  value: "Y3Jvc3NwbGFuZS1wcm92aWRlcnM="
